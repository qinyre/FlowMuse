stages:
  - quality
  - build

default:
  interruptible: true

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "web"'

analyze_flutter:
  stage: quality
  tags: [ohos]
  script:
    - cd FlowMuse-App
    - $env:Path = "$env:FLUTTER_OHOS_HOME\bin;$env:NODE_HOME;$env:Path"
    - flutter pub get
    - flutter analyze --no-fatal-warnings --no-fatal-infos
    - flutter test

test_server:
  stage: quality
  tags: [linux]
  script:
    - cd FlowMuse-Server
    - go test ./...
    - go vet ./...

build_ohos:
  stage: build
  tags: [ohos]
  script:
    - cd FlowMuse-App
    - $env:Path = "$env:FLUTTER_OHOS_HOME\bin;$env:NODE_HOME;$env:HVIGOR_HOME;$env:Path"
    - if (-not $env:OHOS_BUILD_PROFILE) { throw 'OHOS_BUILD_PROFILE not configured' }
    - Copy-Item -LiteralPath $env:OHOS_BUILD_PROFILE -Destination 'ohos\build-profile.json5'
    - flutter pub get
    - flutter build hap --debug
  artifacts:
    paths: [FlowMuse-App/build/ohos/hap/entry-default-signed.hap]
    expire_in: 7 days
